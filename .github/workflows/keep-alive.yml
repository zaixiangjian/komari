name: Bulk Docker Hub Keep Alive
# Actions变量名称
# 名称DOCKER_USERNAME
# 用户名例如zaixiangjian
# 密钥DOCKER_PASSWORD
# 获取https://app.docker.com/accounts/zaixiangjian/settings/personal-access-tokens
on:
  schedule:
    # 设定为每月1号 UTC 时间 0点运行一次
    - cron: '0 6 20 * *'   # 每月20号 UTC 6点
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Pull and Re-Push Images
        run: |
          IMAGES=(
            "zaixiangjian/komari:latest"

          )

          echo "Processing ${#IMAGES[@]} images..."

          for image in "${IMAGES[@]}"; do
            echo "----------------------------------------"
            echo "Processing $image"

            docker pull $image || { echo "Pull failed, skipping..."; continue; }
            docker push $image || echo "Push failed, skipping..."

          done

          echo "All done."
